<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page introuvable | Mikaël Andraos</title>
    <meta name="description" content="Cette page n'existe pas ou a été déplacée. Retournez à l'accueil du portfolio de Mikaël Andraos.">
    <meta name="robots" content="noindex">

    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
    <link rel="icon" href="images/favicon.ico">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50:'#eef1f8', 100:'#e0e6f3', 400:'#41538f', 500:'#1e3a8a', 600:'#15295f', 900:'#0f1f49' },
                        indigo: { 500:'#1e3a8a' },
                        slate: { 50:'#faf7f1', 100:'#f1ead9', 200:'#e6dfce', 300:'#d3c9b2', 400:'#9b9486', 500:'#7c7567', 600:'#574f40', 700:'#3e3729', 800:'#2a2820', 900:'#1c2b3a', 950:'#141b24' }
                    },
                    fontFamily: {
                        display: ['Gloock', 'serif'],
                        sans: ['Instrument Sans', 'sans-serif'],
                        mono: ['Geist Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gloock&family=Instrument+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Instrument Sans', sans-serif; background:#faf7f1; }
        h1, h2 { font-family: 'Gloock', serif; font-weight: 400 !important; letter-spacing: .2px; }
        .bg-white { background-color:#fffdf8 !important; }
        .tracking-widest, .tracking-wider, .font-mono { font-family: 'Space Grotesk', sans-serif; }
        footer .tracking-widest, footer .tracking-wider, footer .font-mono { font-family: 'Geist Mono', monospace; }

        .nav-link { position: relative; padding-bottom: 2px; }
        .nav-link::after { content:''; position:absolute; left:0; bottom:-2px; width:0; height:1px; background-color:#1e3a8a; transition:width .3s ease; }
        .nav-link:hover::after { width:100%; }

        .shore {
            position: relative;
            min-height: calc(100vh - 64px - 137px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #faf7f1;
        }
        .shore-content {
            flex: 1;
            display: flex;
            align-items: center;
        }
        .shore-tide {
            position: relative;
            flex-shrink: 0;
            height: 170px;
        }
        .shore-tide::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, #f1ead9 0%, #e6dfce 100%);
        }
        .sea-band {
            position: absolute;
            left: 0; right: 0; bottom: 0;
            top: 60%;
            background: linear-gradient(180deg, rgba(30,58,138,0.07) 0%, rgba(30,58,138,0.14) 100%);
        }
        .wave-line {
            position: absolute;
            left: 0; right: 0;
            top: 52%;
            width: 100%;
            height: auto;
            display: block;
        }
        .wave-line--back { top: 46%; opacity: .5; }
        .wave-line--front { top: 52%; }

        .anchor-washed {
            width: 108px;
            height: auto;
            transform: rotate(112deg);
            filter: drop-shadow(0 8px 14px rgba(30,58,138,0.18));
        }
        @media (min-width: 640px) { .anchor-washed { width: 136px; } }

        .anchor-404-num {
            font-size: clamp(5.5rem, 16vw, 9.5rem);
            line-height: 1;
            color: #1e3a8a;
        }

        @keyframes bob { 0%, 100% { transform: translateY(0) rotate(112deg); } 50% { transform: translateY(-6px) rotate(114deg); } }
        .anchor-washed { animation: bob 5s ease-in-out infinite; }
        @media (prefers-reduced-motion: reduce) { .anchor-washed { animation: none; } }
    </style>
</head>
<body class="text-slate-900 min-h-screen flex flex-col">

    <header class="fixed top-0 left-0 right-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="./" class="text-xl font-bold tracking-wider text-brand-500 hover:text-brand-600 transition" style="font-family:'Gloock',serif;letter-spacing:0">Mikaël Andraos</a>
            <nav class="hidden md:flex space-x-8 text-sm font-medium">
                <a href="./#propos" class="nav-link hover:text-brand-500 transition">À propos</a>
                <a href="./#projets" class="nav-link hover:text-brand-500 transition">Projets</a>
                <a href="./#competences" class="nav-link hover:text-brand-500 transition">Compétences</a>
                <a href="blog/" class="nav-link hover:text-brand-500 transition">Blog</a>
                <a href="faq.html" class="nav-link hover:text-brand-500 transition">FAQ</a>
                <a href="./#contact" class="nav-link hover:text-brand-500 transition">Contact</a>
            </nav>
        </div>
    </header>

    <main class="flex-1 pt-16">
        <section class="shore" aria-labelledby="error-heading">
            <div class="shore-content">
                <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-16 text-center w-full">
                    <img src="images/logo-aencre.png" alt="" aria-hidden="true" class="anchor-washed mx-auto mb-8">

                    <p class="anchor-404-num font-display" aria-hidden="true">404</p>

                    <h1 id="error-heading" class="text-3xl sm:text-4xl mt-2 mb-4">Cette page a pris le large.</h1>
                    <p class="text-slate-600 max-w-lg mx-auto mb-10">Le lien que vous suivez a dérivé, ou n'a jamais existé. Revenons à bon port.</p>

                    <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                        <a href="./" class="inline-flex items-center px-6 py-3 text-xs font-semibold uppercase tracking-wider text-white bg-brand-500 rounded-lg hover:bg-brand-600 transition">Retour à l'accueil</a>
                        <a href="blog/" class="inline-flex items-center px-6 py-3 text-xs font-semibold uppercase tracking-wider text-brand-500 border border-brand-500/30 rounded-lg hover:bg-brand-50 transition">Voir le blog</a>
                    </div>
                </div>
            </div>

            <div class="shore-tide" aria-hidden="true">
                <div class="sea-band"></div>
                <svg class="wave-line wave-line--back" viewBox="0 0 1200 40" preserveAspectRatio="none"><path d="M0 20 Q150 0 300 20 T600 20 T900 20 T1200 20 V40 H0 Z" fill="#1e3a8a" opacity="0.10"></path></svg>
                <svg class="wave-line wave-line--front" viewBox="0 0 1200 40" preserveAspectRatio="none"><path d="M0 24 Q150 4 300 24 T600 24 T900 24 T1200 24 V40 H0 Z" fill="#1e3a8a" opacity="0.16"></path></svg>
            </div>
        </section>
    </main>

    <footer class="bg-white border-t border-slate-200 py-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row items-center justify-between gap-6">
            <a href="./" class="shrink-0" aria-label="Mikaël Andraos — accueil">
                <img src="images/logo-aencre.png" alt="Mikaël Andraos" title="Mikaël Andraos" class="h-8 w-auto" loading="lazy">
            </a>
            <nav aria-label="Navigation du pied de page" class="flex flex-wrap items-center justify-center gap-x-8 gap-y-2">
                <a href="blog/" class="text-xs font-semibold uppercase tracking-widest text-slate-600 hover:text-brand-500 transition">Blog</a>
                <a href="faq.html" class="text-xs font-semibold uppercase tracking-widest text-slate-600 hover:text-brand-500 transition">FAQ</a>
                <a href="https://linkedin.com/in/mikael-andraos" target="_blank" rel="noopener" class="group inline-flex items-center gap-1.5 text-xs font-semibold uppercase tracking-widest text-slate-600 hover:text-brand-500 transition">
                    LinkedIn
                    <svg class="w-3 h-3 group-hover:-translate-y-0.5 group-hover:translate-x-0.5 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 17L17 7M7 7h10v10"></path></svg>
                </a>
                <a href="https://www.malt.fr/profile/mikaelandraos" target="_blank" rel="noopener" class="group inline-flex items-center gap-1.5 text-xs font-semibold uppercase tracking-widest text-slate-600 hover:text-brand-500 transition">
                    Malt
                    <svg class="w-3 h-3 group-hover:-translate-y-0.5 group-hover:translate-x-0.5 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 17L17 7M7 7h10v10"></path></svg>
                </a>
            </nav>
            <p class="text-sm text-slate-500">&copy; 2026 Mikaël Andraos. Tous droits réservés.</p>
        </div>
    </footer>

</body>
</html>
