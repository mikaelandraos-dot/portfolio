/* ──────────────────────────── APP ─────────────────────────── */
function App() {

  const copyToClipboard = (text, name) => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand('copy');
      setCopySuccess(`Numéro de ${name} copié !`);
      setTimeout(() => setCopySuccess(''), 3000);
    } catch (e) {}
    document.body.removeChild(ta);
  };

  const filteredTransports = useMemo(() => {
    return TRANSPORTS_DATA.filter((item) => {
      const matchDay    = selectedDay  === 'Tous' || item.jourLabel === selectedDay;
      const matchType   = selectedType === 'Tous' || item.type      === selectedType;
      const q           = searchQuery.toLowerCase();
      const matchSearch = q === '' ||
        item.artiste.toLowerCase().includes(q) ||
        item.lieu.toLowerCase().includes(q) ||
        (item.infos      && item.infos.toLowerCase().includes(q)) ||
        (item.transport  && item.transport.toLowerCase().includes(q));
      return matchDay && matchType && matchSearch;
    });
  }, [selectedDay, selectedType, searchQuery]);

  const alertsCount = useMemo(() => TRANSPORTS_DATA.filter(t => t.alerte).length, []);
  const hasFilters   = selectedDay !== 'Tous' || selectedType !== 'Tous' || searchQuery !== '';

  return (
    <div className="min-h-screen bg-slate-50 text-slate-800 font-sans pb-16">

      {/* ── HEADER ── */}

            <div className="flex items-center gap-2 mb-2">

              </span>

            <p className="mt-1 text-slate-300 text-sm sm:text-base max-w-xl">
              Fiche Logistique Interactive &amp; Planning des Transports Artistes.
            </p>
          </div>
          <div className="flex flex-wrap gap-2 sm:gap-4">
            {[
              { val: TRANSPORTS_DATA.length,                                 label: 'Trajets',    color: 'text-amber-400' },
              { val: TRANSPORTS_DATA.filter(t=>t.type==='Arrivée').length,  label: 'Arrivées',   color: 'text-emerald-400' },
              { val: TRANSPORTS_DATA.filter(t=>t.type==='Départ').length,   label: 'Départs',    color: 'text-sky-400' },
              { val: alertsCount,                                             label: 'Vigilances', color: 'text-amber-500' }

                <span className={`block text-2xl font-black ${color}`}>{val}</span>
                <span className="text-[10px] uppercase tracking-wider text-slate-300">{label}</span>

                </div>
              </div>

              {/* Jours */}
              <div className="space-y-2">
                <span className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Jour</span>
                <div className="flex flex-wrap gap-1.5">
                  {days.map((day) => (
                    <button
                      key={day}
                      onClick={() => setSelectedDay(day)}
                      className={`px-3.5 py-1.5 rounded-xl text-xs sm:text-sm font-medium transition-all ${
                        selectedDay === day
                          ? 'bg-indigo-600 text-white shadow-sm'
                          : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
                      }`}
                    >
                      {day}{day !== 'Tous' && ` (${TRANSPORTS_DATA.filter(t => t.jourLabel === day).length})`}
                    </button>
                  ))}
                </div>
              </div>

              {/* Type */}
              <div className="flex items-center gap-4 pt-1 border-t border-slate-100">
                <span className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Type :</span>
                <div className="flex gap-2">
                  {['Tous', 'Arrivée', 'Départ'].map((type) => (
                    <button
                      key={type}
                      onClick={() => setSelectedType(type)}
                      className={`px-3 py-1 rounded-lg text-xs font-bold uppercase transition-all ${
                        selectedType === type
                          ? type === 'Arrivée'
                            ? 'bg-emerald-100 text-emerald-800 border border-emerald-200'
                            : type === 'Départ'
                              ? 'bg-sky-100 text-sky-800 border border-sky-200'
                              : 'bg-slate-800 text-white'
                          : 'bg-transparent text-slate-500 hover:bg-slate-100'
                      }`}
                    >
                      {type}
                    </button>
                  ))}
                </div>
              </div>
            </div>

            {/* Liste trajets */}
            <div className="space-y-4">
              <div className="flex justify-between items-center">
                <h3 className="text-lg font-extrabold text-slate-900 flex items-center gap-2">
                  Planning des Mouvements
                  <span className="bg-indigo-100 text-indigo-800 text-xs px-2.5 py-0.5 rounded-full font-bold">
                    {filteredTransports.length} trajet{filteredTransports.length !== 1 ? 's' : ''}
                  </span>
                </h3>
                {hasFilters && (
                  <button
                    onClick={() => { setSelectedDay('Tous'); setSelectedType('Tous'); setSearchQuery(''); }}
                    className="text-xs text-indigo-600 hover:text-indigo-800 font-medium"
                  >
                    Réinitialiser
                  </button>
                )}
              </div>

              {filteredTransports.length === 0 ? (
                <div className="bg-white rounded-2xl p-12 text-center border border-slate-100">
                  <div className="inline-flex p-4 bg-slate-100 rounded-full text-slate-400 mb-3">
                    <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2"
                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                  </div>
                  <h4 className="text-slate-900 font-bold text-base">Aucun transport trouvé</h4>
                  <p className="text-slate-500 text-sm mt-1">Ajustez vos filtres pour trouver un trajet.</p>
                </div>
              ) : (
                <div className="space-y-3">
                  {filteredTransports.map((t) => (
                    <TransportCard key={t.id} transport={t} onCopy={copyToClipboard} />
                  ))}
                </div>
              )}
            </div>
          </div>

          {/* ─── SIDEBAR ─── */}
          <div className="space-y-6">

            {/* Alertes récap */}
            <div className="bg-amber-50 border border-amber-200 rounded-2xl p-5">
              <h3 className="text-sm font-extrabold text-amber-900 flex items-center gap-2 mb-4">
                <svg className="w-4 h-4 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2"
                    d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
                Points de vigilance ({alertsCount})
              </h3>
              <div className="space-y-2.5">
                {TRANSPORTS_DATA.filter(t => t.alerte).map((t) => (
                  <div key={t.id} className="bg-white/70 rounded-xl px-3 py-2 border border-amber-100">
                    <p className="text-xs font-bold text-slate-800">{t.artiste}</p>
                    <p className="text-[11px] text-slate-500">{t.date} · {t.heure}</p>
                    <p className="text-[11px] font-semibold text-amber-700 mt-0.5">{t.alerteMsg}</p>
                  </div>
                ))}
              </div>
            </div>

            {/* Contacts chauffeurs */}
            <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
              <h3 className="text-sm font-extrabold text-slate-900 flex items-center gap-2 mb-1">
                <svg className="w-4 h-4 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2"
                    d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                Chauffeurs &amp; Orga
              </h3>
              <p className="text-[11px] text-slate-400 mb-3">Cliquez sur le téléphone pour appeler directement</p>
              {CONTACTS_CHAUFFEURS.map((c) => (
                <ContactCard key={c.nom} contact={c} onCopy={copyToClipboard} />
              ))}
            </div>

            {/* Contacts artistes */}
            <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
              <h3 className="text-sm font-extrabold text-slate-900 flex items-center gap-2 mb-1">
                <svg className="w-4 h-4 text-violet-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2"
                    d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                </svg>
                Contacts Artistes
              </h3>
              <p className="text-[11px] text-slate-400 mb-3">Numéros directs artistes</p>
              {CONTACTS_ARTISTES.map((c) => (
                <ContactCard key={c.nom} contact={c} onCopy={copyToClipboard} />
              ))}
            </div>

            {/* Légende */}
            <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
              <h3 className="text-sm font-extrabold text-slate-900 mb-3">Légende</h3>
              <div className="space-y-2 text-xs">
                <div className="flex items-center gap-2">
                  <span className="w-3 h-3 rounded-full bg-emerald-500 shrink-0" />
                  <span className="text-slate-600">Arrivée artiste</span>
                </div>
                <div className="flex items-center gap-2">
                  <span className="w-3 h-3 rounded-full bg-sky-500 shrink-0" />
                  <span className="text-slate-600">Départ artiste</span>
                </div>
                <div className="flex items-center gap-2">
                  <span className="w-3 h-3 rounded-full bg-amber-500 shrink-0" />
                  <span className="text-slate-600">Point de vigilance / action requise</span>
                </div>
                <div className="flex items-center gap-2">
                  <span className="w-3 h-3 rounded-full bg-violet-500 shrink-0" />
                  <span className="text-slate-600">Instrument volumineux à prévoir</span>
                </div>
              </div>
            </div>

          </div>
        </div>
      </main>

      <footer className="mt-12 text-center text-xs text-slate-400 pb-4">
        Èze Harmonies 2026 · Fiche Logistique Transport · Usage interne
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
